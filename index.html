<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACSC Picture Frame Styles</title>

    <script>
        (function() {
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            if (/Android/i.test(ua) && ua.indexOf("Line") > -1) {
                var currentUrl = window.location.href.replace(/http(s)?:\/\//, "");
                window.location.href = "intent://" + currentUrl + "#Intent;scheme=https;package=com.android.chrome;end";
            }
        })();
    </script>

    <style>
        /* =========================================
           1. BASE STYLES & LAYOUT
           ========================================= */
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #cbd5e1; /* สีพื้นหลังเมื่อเปิดบน Desktop */
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }

        /* ล็อกขนาดให้รองรับเฉพาะมือถือและแท็บเล็ต */
        .container {
            background-image: url('img/background2.png');
            background-size: cover;
            background-position: center;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            width: 100%;
            max-width: 550px; /* ขนาดสูงสุด (แท็บเล็ตแนวตั้ง) */
            display: flex;
            flex-direction: column;
        }

        /* =========================================
           2. HEADER & LOGO
           ========================================= */
        .logo-header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 5px;
        }

        .header-logo {
            height: 75px;
            width: 75px;
            object-fit: contain;
            border-radius: 50%; /* วงกลม */
            border: none; /* ไร้ขอบ */
            background: radial-gradient(circle, rgba(255, 255, 255, 0.9) 10%, rgba(251, 243, 4, 0.6) 45%, transparent 75%); /* สีเปล่งแสง */
            box-shadow: 0 0 20px 8px rgba(251, 243, 4, 0.3); /* แสงฟุ้ง */
        }

        h1 {
            color: #fbf304;
            font-size: 20px;
            background-color: rgba(48, 18, 243, 0.7);
            border: 3px solid #4f46e5;
            border-radius: 12px;
            padding: 8px 15px;
            margin: 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .subtitle {
            color: #ecf805;
            font-size: 14px;
            margin: 5px 0 20px 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* =========================================
           3. FRAME SELECTOR GRID
           ========================================= */
        .frame-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .frame-option {
            width: 100%;
            aspect-ratio: 1 / 1;
            border: 3px solid #cbd5e1;
            border-radius: 10px;
            cursor: pointer;
            padding: 3px;
            background-color: #f8fafc;
            object-fit: contain;
            transition: all 0.2s ease;
        }

        .frame-option.active {
            border-color: #4f46e5;
            box-shadow: 0 0 12px rgba(79, 70, 229, 0.4);
            transform: scale(1.05); /* ขยายเล็กน้อยเมื่อเลือก */
        }

        /* =========================================
           4. CONTROLS & BUTTONS
           ========================================= */
        .upload-btn {
            background-color: #0ea5e9;
            color: white;
            padding: 15px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-family: inherit;
        }

        .sliders-box {
            background: rgba(187, 213, 238, 0.95);
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sliders-box label {
            font-size: 14px;
            font-weight: bold;
            color: #1e05c0;
            white-space: nowrap;
        }

        .sliders-box input[type="range"] {
            flex: 1;
        }

        .btn-save {
            background-color: #4f46e5;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            margin-top: auto; /* ดันปุ่มเซฟให้อยู่ล่างสุดเสมอ */
        }
        .btn-save:disabled { background-color: #94a3b8; cursor: not-allowed; }

        /* =========================================
           5. CANVAS
           ========================================= */
        .canvas-container {
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            background-color: #f8fafc;
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: move;
            margin-bottom: 15px;
            overflow: hidden;
            touch-action: none; /* ป้องกันไม่ให้จอมือถือเลื่อนเวลาลากรูป */
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        /* =========================================
           6. POPUPS (ACTION SHEET & PREVIEW)
           ========================================= */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s ease;
            padding: 15px;
        }
        
        .overlay.show { display: flex; opacity: 1; }

        /* Action Sheet (เลือกรูป) */
        .action-sheet-wrapper {
            align-items: flex-end;
            justify-content: center;
        }
        .action-sheet {
            width: 100%;
            max-width: 500px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
            padding-bottom: env(safe-area-inset-bottom, 10px);
        }
        .overlay.show .action-sheet { transform: translateY(0); }
        
        .action-menu { background: #fff; border-radius: 14px; margin-bottom: 10px; overflow: hidden; }
        .action-btn, .cancel-btn {
            width: 100%; padding: 18px 20px; background: #fff; border: none;
            font-size: 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        .action-btn:not(:last-child) { border-bottom: 1px solid #eee; }
        .cancel-btn { border-radius: 14px; color: #e11d48; font-weight: bold; justify-content: center; }

        /* Preview Box (เซฟรูป) */
        .preview-wrapper { align-items: center; justify-content: center; }
        .preview-box {
            background: white; padding: 20px; border-radius: 15px;
            width: 100%; max-width: 400px; text-align: center;
        }
        .preview-box img { width: 100%; border-radius: 10px; border: 1px solid #ddd; }
        .preview-box p { font-weight: bold; color: #e11d48; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-header-container">
            <img src="img/Star.png" alt="ACSC Logo" class="header-logo"> 
            <h1>ACSC Picture Frame Styles</h1>                                    
        </div>
        <p class="subtitle">เลือกกรอบ อัพโหลดรูป และปรับขนาดได้ตามใจชอบ</p>
        
        <div class="frame-selector">
            <img src="img/frame1.png" class="frame-option active" onclick="changeFrame('img/frame1.png', this)">
            <img src="img/frame2.png" class="frame-option" onclick="changeFrame('img/frame2.png', this)">
            <img src="img/frame3.png" class="frame-option" onclick="changeFrame('img/frame3.png', this)">
            <img src="img/frame4.png" class="frame-option" onclick="changeFrame('img/frame4.png', this)">
            <img src="img/frame5.png" class="frame-option" onclick="changeFrame('img/frame5.png', this)">
            <img src="img/frame6.png" class="frame-option" onclick="changeFrame('img/frame6.png', this)">
        </div>

        <button type="button" class="upload-btn" onclick="openActionSheet()">2. เลือกรูปภาพของคุณ</button>
        <input type="file" id="galleryInput" accept="image/*" style="display: none;">
        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">

        <div class="canvas-container">
            <canvas id="imageCanvas" width="800" height="800"></canvas>
        </div>

        <div class="sliders-box">
            <label>🔍 ซูมรูปภาพ:</label>
            <input type="range" id="zoomSlider" value="1" disabled>
        </div>

        <button id="downloadBtn" class="btn-save" disabled>บันทึกรูปภาพที่แต่งเสร็จแล้ว</button>
    </div>

    <div id="actionSheetOverlay" class="overlay action-sheet-wrapper" onclick="closeActionSheet(event)">
        <div id="actionSheet" class="action-sheet" onclick="event.stopPropagation()">
            <div class="action-menu">
                <button class="action-btn" onclick="triggerInput('galleryInput')">
                    <span>คลังรูปภาพ</span>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                </button>
                <button class="action-btn" onclick="triggerInput('cameraInput')">
                    <span>ถ่ายภาพ</span>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                </button>
                <button class="action-btn" onclick="triggerInput('galleryInput')">
                    <span>เลือกไฟล์</span>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                </button>
            </div>
            <button class="cancel-btn" onclick="closeActionSheet(event)">ยกเลิก</button>
        </div>
    </div>

    <div id="previewOverlay" class="overlay preview-wrapper">
        <div class="preview-box">
            <p>👇 กดค้างที่รูปภาพ เพื่อบันทึก 👇</p>
            <img id="mobilePreviewImg" src="">
            <button class="upload-btn" style="background-color: #64748b; margin-top: 15px; margin-bottom: 0;" onclick="closePreview()">กลับไปแก้ไข</button>
        </div>
    </div>

    <script>
        // --- ตัวแปรหลัก ---
        const canvas = document.getElementById('imageCanvas');
        const ctx = canvas.getContext('2d');
        const downloadBtn = document.getElementById('downloadBtn');
        const zoomSlider = document.getElementById('zoomSlider');
        
        let userImage = new Image();
        let frameImage = new Image();
        let hasUserImage = false;
        let imgScale = 1, imgOffsetX = 0, imgOffsetY = 0;
        let currentBlobUrl = null;
        let isDragging = false, startX = 0, startY = 0;

        // --- โหลดกรอบเริ่มต้น ---
        frameImage.crossOrigin = "anonymous";
        frameImage.src = 'img/frame1.png'; 
        frameImage.onload = drawCanvasPlaceholder;

        // --- ฟังก์ชันวาด Canvas ---
        function drawCanvasPlaceholder() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#e2e8f0";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (hasUserImage) {
                renderCombinedImage();
            } else {
                ctx.drawImage(frameImage, 0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#64748b";
                ctx.font = "30px Arial";
                ctx.textAlign = "center";
                ctx.fillText("กรุณาเลือกรูปภาพของคุณในขั้นตอนที่ 2", canvas.width / 2, canvas.height / 2 + 10);
            }
        }

        function renderCombinedImage() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let bw = userImage.width * imgScale;
            let bh = userImage.height * imgScale;
            let x = (canvas.width / 2) - (bw / 2) + imgOffsetX;
            let y = (canvas.height / 2) - (bh / 2) + imgOffsetY;
            ctx.drawImage(userImage, x, y, bw, bh);
            ctx.drawImage(frameImage, 0, 0, canvas.width, canvas.height);
        }

        function changeFrame(src, el) {
            frameImage.src = src;
            document.querySelectorAll('.frame-option').forEach(e => e.classList.remove('active'));
            el.classList.add('active');
            frameImage.onload = () => hasUserImage ? renderCombinedImage() : drawCanvasPlaceholder();
        }

        // --- จัดการรูปภาพ (อัปโหลด & ซูม) ---
        ['galleryInput', 'cameraInput'].forEach(id => {
            document.getElementById(id).addEventListener('change', function(e) {
                if(!e.target.files[0]) return;
                const reader = new FileReader();
                reader.onload = event => {
                    userImage.crossOrigin = "anonymous";
                    userImage.onload = () => {
                        hasUserImage = true;
                        let baseScale = Math.max(canvas.width / userImage.width, canvas.height / userImage.height);
                        zoomSlider.min = (baseScale * 0.6).toFixed(2);
                        zoomSlider.max = (baseScale * 4.0).toFixed(2);
                        zoomSlider.step = "0.01";
                        zoomSlider.value = imgScale = baseScale;
                        imgOffsetX = 0; imgOffsetY = 0;
                        zoomSlider.disabled = downloadBtn.disabled = false;
                        renderCombinedImage();
                    };
                    userImage.src = event.target.result;
                };
                reader.readAsDataURL(e.target.files[0]);
                e.target.value = ''; // เคลียร์ค่า
            });
        });

        zoomSlider.addEventListener('input', e => { imgScale = parseFloat(e.target.value); renderCombinedImage(); });

        // --- ระบบลากรูปภาพ ---
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (clientX - rect.left) * (canvas.width/rect.width), y: (clientY - rect.top) * (canvas.height/rect.height) };
        }
        function startDrag(e) {
            if (!hasUserImage) return;
            isDragging = true;
            const pos = getPos(e);
            startX = pos.x - imgOffsetX; startY = pos.y - imgOffsetY;
            if(e.cancelable) e.preventDefault();
        }
        function dragMove(e) {
            if (!isDragging) return;
            const pos = getPos(e);
            imgOffsetX = pos.x - startX; imgOffsetY = pos.y - startY;
            renderCombinedImage();
            if(e.cancelable) e.preventDefault();
        }
        function stopDrag() { isDragging = false; }

        canvas.addEventListener('mousedown', startDrag); window.addEventListener('mousemove', dragMove); window.addEventListener('mouseup', stopDrag);
        canvas.addEventListener('touchstart', startDrag, {passive: false}); canvas.addEventListener('touchmove', dragMove, {passive: false}); canvas.addEventListener('touchend', stopDrag);

        // --- UI Popups (Action Sheet & Preview) ---
        function openActionSheet() {
            const ol = document.getElementById('actionSheetOverlay');
            ol.classList.add('show');
            setTimeout(() => ol.style.opacity = 1, 10);
        }
        function closeActionSheet(e) {
            if(e) e.preventDefault();
            const ol = document.getElementById('actionSheetOverlay');
            ol.classList.remove('show');
        }
        function triggerInput(id) {
            closeActionSheet();
            setTimeout(() => document.getElementById(id).click(), 300);
        }

        downloadBtn.addEventListener('click', () => {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (isMobile) {
                document.getElementById('mobilePreviewImg').src = canvas.toDataURL('image/png');
                document.getElementById('previewOverlay').classList.add('show');
            } else {
                canvas.toBlob(blob => {
                    if (!blob) return;
                    if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
                    currentBlobUrl = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.download = 'acsc-frame.png';
                    link.href = currentBlobUrl;
                    link.click();
                }, 'image/png');
            }
        });
        function closePreview() { document.getElementById('previewOverlay').classList.remove('show'); }
    </script>
</body>
</html>
