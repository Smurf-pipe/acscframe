<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>โรงเรียนเสนาธิการทหารอากาศ</title>

    <script>
        (function() {
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            if (/Android/i.test(ua) && ua.indexOf("Line") > -1) {
                var currentUrl = window.location.href.replace(/http(s)?:\/\//, "");
                window.location.href = "intent://" + currentUrl + "#Intent;scheme=https;package=com.android.chrome;end";
            }
        })();
    </script>

    <style>
        /* สไตล์เดิมของคุณ */
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #cbd5e1; display: flex; justify-content: center; min-height: 100vh; margin: 0; padding: 10px; }
        .container { background-image: url('img/background2.png'); background-size: cover; background-position: center; padding: 20px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); text-align: center; width: 100%; max-width: 550px; display: flex; flex-direction: column; }
        .logo-header-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 5px; }
        .header-logo { height: 75px; width: 75px; object-fit: contain; border-radius: 50%; border: none; background: radial-gradient(circle, rgba(255, 255, 255, 0.9) 10%, rgba(251, 243, 4, 0.6) 45%, transparent 75%); box-shadow: 0 0 20px 8px rgba(251, 243, 4, 0.3); }
        h1 { color: #fbf304; font-size: 20px; background-color: rgba(48, 18, 243, 0.7); border: 3px solid #4f46e5; border-radius: 12px; padding: 8px 15px; margin: 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .subtitle { color: #ecf805; font-size: 14px; margin: 5px 0 20px 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .frame-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .frame-option { width: 100%; aspect-ratio: 1 / 1; border: 3px solid #cbd5e1; border-radius: 10px; cursor: pointer; padding: 3px; background-color: #f8fafc; object-fit: contain; transition: all 0.2s ease; }
        .frame-option.active { border-color: #4f46e5; box-shadow: 0 0 12px rgba(79, 70, 229, 0.4); transform: scale(1.05); }
        .upload-btn { background-color: #0ea5e9; color: white; padding: 15px; border-radius: 10px; border: none; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; text-align: center; }
        .upload-btn:active { background-color: #0284c7; }
        .sliders-box { background: rgba(187, 213, 238, 0.95); padding: 12px 15px; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .sliders-box label { font-size: 14px; font-weight: bold; color: #1e05c0; white-space: nowrap; }
        .btn-save { background-color: #4f46e5; color: white; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: auto; }
        .btn-save:disabled { background-color: #94a3b8; cursor: not-allowed; }
        .canvas-container { border: 2px dashed #cbd5e1; border-radius: 12px; background-color: #f8fafc; aspect-ratio: 1 / 1; display: flex; justify-content: center; align-items: center; cursor: move; margin-bottom: 15px; overflow: hidden; touch-action: none; }
        canvas { width: 100% !important; height: 100% !important; display: block; }
        
        /* สไตล์สำหรับ Action Sheet ของ Android */
        .action-sheet { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-radius: 20px 20px 0 0; padding: 20px; z-index: 3000; box-shadow: 0 -5px 15px rgba(0,0,0,0.2); }
        .action-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #f1f5f9; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.7); z-index: 2000; opacity: 0; transition: opacity 0.3s; }
        .overlay.show { display: flex; opacity: 1; }
        .preview-box { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
        .preview-box img { width: 100%; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-header-container">
            <img src="img/Star.png" alt="ACSC Logo" class="header-logo"> 
            <h1>ACSC Frame Styles</h1>                                    
        </div>
        <p class="subtitle">เลือกกรอบ อัพโหลดรูป และปรับขนาดได้ตามใจชอบ</p>
        
        <div class="frame-selector">
            <img src="img/frame1.png" class="frame-option active" onclick="changeFrame('img/frame1.png', this)">
            <img src="img/frame2.png" class="frame-option" onclick="changeFrame('img/frame2.png', this)">
            <img src="img/frame3.png" class="frame-option" onclick="changeFrame('img/frame3.png', this)">
            <img src="img/frame4.png" class="frame-option" onclick="changeFrame('img/frame4.png', this)">
            <img src="img/frame5.png" class="frame-option" onclick="changeFrame('img/frame5.png', this)">
            <img src="img/frame6.png" class="frame-option" onclick="changeFrame('img/frame6.png', this)">
        </div>

        <button type="button" class="upload-btn" onclick="handleUpload()">2. เลือกรูปภาพของคุณ</button>
        
        <input type="file" id="imageLoader" accept="image/*" style="display: none;">

        <div class="canvas-container">
            <canvas id="imageCanvas" width="800" height="800"></canvas>
        </div>

        <div class="sliders-box">
            <label>🔍 ซูมรูปภาพ:</label>
            <input type="range" id="zoomSlider" value="1" disabled>
        </div>

        <button id="downloadBtn" class="btn-save" disabled>บันทึกรูปภาพที่แต่งเสร็จแล้ว</button>
    </div>

    <div id="actionSheetOverlay" class="overlay" onclick="closeActionSheet()"></div>
    <div id="actionSheet" class="action-sheet">
        <button class="action-btn" onclick="triggerInput()">คลังรูปภาพ</button>
        <button class="action-btn" onclick="triggerCamera()">ถ่ายภาพ</button>
        <button class="action-btn" onclick="closeActionSheet()" style="background:#ef4444; color:white;">ยกเลิก</button>
    </div>

    <script>
        // --- ฟังก์ชันแยก Android กับ iOS ---
        function isAndroid() { return /Android/i.test(navigator.userAgent); }
        
        function handleUpload() {
            if (isAndroid()) {
                document.getElementById('actionSheet').style.display = 'block';
                document.getElementById('actionSheetOverlay').classList.add('show');
            } else {
                document.getElementById('imageLoader').click();
            }
        }

        function closeActionSheet() {
            document.getElementById('actionSheet').style.display = 'none';
            document.getElementById('actionSheetOverlay').classList.remove('show');
        }

        function triggerInput() { closeActionSheet(); document.getElementById('imageLoader').click(); }
        function triggerCamera() { closeActionSheet(); document.getElementById('imageLoader').setAttribute('capture', 'environment'); document.getElementById('imageLoader').click(); }

        // --- ส่วนที่เหลือของ Logic การวาด (เหมือนเดิม) ---
        const canvas = document.getElementById('imageCanvas');
        const ctx = canvas.getContext('2d');
        const downloadBtn = document.getElementById('downloadBtn');
        const zoomSlider = document.getElementById('zoomSlider');
        const imageLoader = document.getElementById('imageLoader');
        let userImage = new Image(), frameImage = new Image(), hasUserImage = false, imgScale = 1, imgOffsetX = 0, imgOffsetY = 0, isDragging = false, startX = 0, startY = 0;

        frameImage.src = 'img/frame1.png';
        frameImage.onload = () => { drawCanvasPlaceholder(); };

        function drawCanvasPlaceholder() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (hasUserImage) { renderCombinedImage(); } else { ctx.drawImage(frameImage, 0, 0, canvas.width, canvas.height); }
        }

        function renderCombinedImage() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(userImage, (canvas.width/2)-(userImage.width*imgScale/2)+imgOffsetX, (canvas.height/2)-(userImage.height*imgScale/2)+imgOffsetY, userImage.width*imgScale, userImage.height*imgScale);
            ctx.drawImage(frameImage, 0, 0, canvas.width, canvas.height);
        }

        imageLoader.addEventListener('change', function(e) {
            if(!e.target.files[0]) return;
            const reader = new FileReader();
            reader.onload = event => {
                userImage.onload = () => {
                    hasUserImage = true;
                    let baseScale = Math.max(canvas.width/userImage.width, canvas.height/userImage.height);
                    zoomSlider.value = imgScale = baseScale;
                    zoomSlider.disabled = downloadBtn.disabled = false;
                    renderCombinedImage();
                };
                userImage.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
            imageLoader.removeAttribute('capture');
        });

        // ระบบลากและการซูม (เดิม)
        zoomSlider.addEventListener('input', e => { imgScale = parseFloat(e.target.value); renderCombinedImage(); });
        // ... (โค้ด Event Listener อื่นๆ ที่คุณมีอยู่เดิม)
    </script>
</body>
</html>
