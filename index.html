<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมแต่งกรอบรูปอัจฉริยะ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: whitesmoke;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }

        h1 {
            color: #1e293b;
            margin-bottom: 5px;
            font-size: 24px;
        }

        p.subtitle {
            color: #64748b;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .container {
            background: lightskyblue;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 550px;
            width: 100%;
            box-sizing: border-box;
        }

        .control-group {
            margin-bottom: 20px;
        }

        /* =======================================================
           🛠️ แก้ไขส่วนจัดการกรอบรูป (Frame Selector) ให้เป็น Responsive Grid
           ======================================================= */
        .frame-selector {
            display: grid;
            /* ค่าเริ่มต้นบนสมาร์ตโฟนจอเล็ก: แบ่งแถวละ 3 รูปเพื่อให้เห็นครบแบบกะทัดรัด */
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 0 auto 20px auto;
            max-width: 100%;
            justify-items: center;
        }

        /* ปรับระดับสำหรับแท็บเล็ตและหน้าจอคอมพิวเตอร์ (หน้าจอกว้าง 450px ขึ้นไป) */
        @media (min-width: 450px) {
            .frame-selector {
                /* ล็อกการแสดงผลเป็น 2 แถว แถวละ 3 รูปอย่างชัดเจนตามสัดส่วนคอนเทนเนอร์ */
                grid-template-columns: repeat(3, 1fr);
                gap: 15px;
                max-width: 320px; /* จำกัดความกว้างของกลุ่มกรอบไม่ให้ยืดหลวมเกินไป */
            }
        }

        .frame-option {
            width: 100%;       /* ให้ความกว้างขยายตามสัดส่วนคอลัมน์ของ Grid */
            max-width: 80px;   /* จำกัดไม่ให้กรอบรูปชิ้นเล็กใหญ่จนเกินงาม */
            aspect-ratio: 1 / 1; /* บังคับให้บล็อกรูปคงรูปทรงสี่เหลี่ยมจัตุรัสไม่เบี้ยว */
            border: 3px solid #cbd5e1;
            border-radius: 10px;
            cursor: pointer;
            padding: 2px;
            transition: all 0.2s;
            background-color: #f8fafc;
            object-fit: contain; /* รักษาอัตราส่วนของวงกลมกรอบรูปด้านในไม่ให้เบี้ยว */
            box-sizing: border-box;
        }

        .frame-option:hover {
            border-color: #0ea5e9;
        }

        .frame-option.active {
            border-color: #4f46e5;
            box-shadow: 0 0 10px rgba(79, 70, 229, 0.3);
        }

        .sliders-box {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: left;
        }

        .slider-control {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
        }

        .slider-control:last-child {
            margin-bottom: 0;
        }

        .slider-control label {
            width: 110px;
            font-size: 13px;
            font-weight: bold;
            color: #960707;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
        }

        .slider-control input[type="range"] {
            flex: 1;
            cursor: pointer;
            min-width: 0;
        }

        .btn {
            background-color: #4f46e5;
            color: white;
            padding: 14px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:hover {
            background-color: #4338ca;
        }

        .btn:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }

        input[type="file"] {
            display: none;
        }

        .upload-label {
            display: inline-block;
            background-color: #0ea5e9;
            color: white;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
            transition: background 0.2s;
            width: 100%;
            box-sizing: border-box;
        }

        .canvas-container {
            margin: 20px auto;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            overflow: hidden;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 100%;
            aspect-ratio: 1 / 1;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        .mobile-preview-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .mobile-preview-box {
            background: white;
            padding: 15px;
            border-radius: 15px;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 5px 25px rgba(0,0,0,0.3);
        }

        .mobile-preview-box img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        .mobile-preview-box p {
            margin: 10px 0;
            font-weight: bold;
            color: #e11d48;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📸 โปรแกรมใส่กรอบรูปอัจฉริยะ</h1>
        <p class="subtitle">อัพโหลดรูป เลือกกรอบ และปรับขนาดได้ตามใจชอบ</p>
        <h3>1. เลือกสไตล์กรอบรูป</h3>
        <div class="frame-selector">
            <img src="img/frame1.png" class="frame-option active" onclick="changeFrame('img/frame1.png', this)" alt="กรอบที่ 1">
            <img src="img/frame2.png" class="frame-option" onclick="changeFrame('img/frame2.png', this)" alt="กรอบที่ 2">
            <img src="img/frame3.png" class="frame-option" onclick="changeFrame('img/frame3.png', this)" alt="กรอบที่ 3">
            <img src="img/frame4.png" class="frame-option" onclick="changeFrame('img/frame4.png', this)" alt="กรอบที่ 4">
            <img src="img/frame5.png" class="frame-option" onclick="changeFrame('img/frame5.png', this)" alt="กรอบที่ 5">
            <img src="img/frame6.png" class="frame-option" onclick="changeFrame('img/frame6.png', this)" alt="กรอบที่ 6">
        </div>

        <div class="control-group">
            <label for="imageLoader" class="upload-label">2. เลือกรูปภาพของคุณ</label>
            <input type="file" id="imageLoader" accept="image/*">
        </div>

        <div class="canvas-container">
            <canvas id="imageCanvas" width="800" height="800"></canvas>
        </div>

        <div class="sliders-box">
            <div class="slider-control">
                <label>🔍 ซูมรูปภาพ:</label>
                <input type="range" id="zoomSlider" min="0.1" max="3" step="0.01" value="1" disabled>
            </div>
            <div class="slider-control">
                <label>↔️ ขยับซ้าย-ขวา:</label>
                <input type="range" id="offsetXSlider" min="-400" max="400" step="1" value="0" disabled>
            </div>
            <div class="slider-control">
                <label>↕️ ขยับขึ้น-ลง:</label>
                <input type="range" id="offsetYSlider" min="-400" max="400" step="1" value="0" disabled>
            </div>
        </div>

        <div class="control-group">
            <button id="downloadBtn" class="btn" disabled>บันทึกรูปภาพที่แต่งเสร็จแล้ว</button>
        </div>
    </div>

    <div id="previewOverlay" class="mobile-preview-overlay">
        <div class="mobile-preview-box">
            <p>👇 กดค้างที่รูปภาพด้านล่าง เพื่อบันทึกเข้าเครื่อง 👇</p>
            <img id="mobilePreviewImg" src="" alt="Framed Preview">
            <button class="btn" style="background-color: #64748b; margin-top: 15px;" onclick="closePreview()">กลับไปแก้ไข</button>
        </div>
    </div>

    <script>
        const imageLoader = document.getElementById('imageLoader');
        const canvas = document.getElementById('imageCanvas');
        const ctx = canvas.getContext('2d');
        const downloadBtn = document.getElementById('downloadBtn');
        
        const zoomSlider = document.getElementById('zoomSlider');
        const offsetXSlider = document.getElementById('offsetXSlider');
        const offsetYSlider = document.getElementById('offsetYSlider');

        const previewOverlay = document.getElementById('previewOverlay');
        const mobilePreviewImg = document.getElementById('mobilePreviewImg');

        let userImage = new Image();
        let frameImage = new Image();
        let hasUserImage = false;

        let imgScale = 1;
        let imgOffsetX = 0;
        let imgOffsetY = 0;
        let currentBlobUrl = null;

        frameImage.crossOrigin = "anonymous";
        frameImage.src = 'img/frame1.png'; // เปลี่ยนให้ดึงรูปแรกเริ่มตามสไตล์ของ active ตัวแรก
        frameImage.onload = function() {
            drawCanvasPlaceholder();
        };

        function drawCanvasPlaceholder() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#e2e8f0";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (hasUserImage) {
                renderCombinedImage();
            } else {
                ctx.drawImage(frameImage, 0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#64748b";
                ctx.font = "28px Arial";
                ctx.textAlign = "center";
                ctx.fillText("กรุณาเลือกรูปภาพของคุณในขั้นตอนที่ 2", canvas.width / 2, canvas.height / 2 + 50);
            }
        }

        function changeFrame(frameSrc, element) {
            frameImage.crossOrigin = "anonymous";
            frameImage.src = frameSrc;
            
            document.querySelectorAll('.frame-option').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            frameImage.onload = function() {
                if(hasUserImage) {
                    renderCombinedImage();
                } else {
                    drawCanvasPlaceholder();
                }
            };
        }

        imageLoader.addEventListener('change', handleImage, false);

        function handleImage(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                userImage.onload = function() {
                    hasUserImage = true;
                    
                    let baseScale = Math.max(canvas.width / userImage.width, canvas.height / userImage.height);
                    zoomSlider.value = baseScale;
                    imgScale = baseScale;
                    
                    offsetXSlider.value = 0;
                    offsetYSlider.value = 0;
                    imgOffsetX = 0;
                    imgOffsetY = 0;

                    zoomSlider.disabled = false;
                    offsetXSlider.disabled = false;
                    offsetYSlider.disabled = false;
                    downloadBtn.disabled = false;

                    renderCombinedImage();
                }
                userImage.src = event.target.result;
            }
            if(e.target.files[0]) {
                reader.readAsDataURL(e.target.files[0]);
            }
        }

        function renderCombinedImage() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let baseWidth = userImage.width * imgScale;
            let baseHeight = userImage.height * imgScale;
            
            let x = (canvas.width / 2) - (baseWidth / 2) + imgOffsetX;
            let y = (canvas.height / 2) - (baseHeight / 2) + imgOffsetY;
            
            ctx.drawImage(userImage, x, y, baseWidth, baseHeight);
            ctx.drawImage(frameImage, 0, 0, canvas.width, canvas.height);
        }

        zoomSlider.addEventListener('input', function() {
            imgScale = parseFloat(this.value);
            renderCombinedImage();
        });

        offsetXSlider.addEventListener('input', function() {
            imgOffsetX = parseInt(this.value);
            renderCombinedImage();
        });

        offsetYSlider.addEventListener('input', function() {
            imgOffsetY = parseInt(this.value);
            renderCombinedImage();
        });

        downloadBtn.addEventListener('click', function() {
            try {
                canvas.toBlob(function(blob) {
                    if (!blob) {
                        alert("ไม่สามารถประมวลผลรูปภาพได้");
                        return;
                    }

                    if (currentBlobUrl) {
                        URL.revokeObjectURL(currentBlobUrl);
                    }

                    currentBlobUrl = URL.createObjectURL(blob);
                    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                    
                    if (isMobile) {
                        mobilePreviewImg.src = currentBlobUrl;
                        previewOverlay.style.display = 'flex';
                    } else {
                        const link = document.createElement('a');
                        link.download = 'custom-framed-image.png';
                        link.href = currentBlobUrl;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                    }
                }, 'image/png');
            } catch (error) {
                console.error("Error generating image:", error);
                alert("เกิดข้อผิดพลาด กรุณาลองแคปหน้าจอแทนนะครับ");
            }
        });

        function closePreview() {
            previewOverlay.style.display = 'none';
        }
    </script>
</body>
</html>
