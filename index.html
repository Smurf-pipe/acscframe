<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมแต่งกรอบรูปอัจฉริยะ</title>
    <style>
        /* =======================================================
            📦 จัดการให้โลโก้และข้อความอยู่ในบรรทัดเดียวกัน
           ======================================================= */
        .logo-header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            margin-bottom: 5px;
            width: 100%;
        }

        .header-logo {
            height: 80px;
            width: auto;
            object-fit: contain;
        }

        .logo-header-container h1 {
            margin: 0;
            display: inline-block;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: whitesmoke;
            color: #d82839;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }

        h1 {
            color: #fbf304;
            font-size: 24px;
        }

        p.subtitle {
            color: #ecf805;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .container {
            background-image: url('img/background2.png');
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 550px;
            width: 100%;
            box-sizing: border-box;
        }

        .control-group {
            margin-bottom: 20px;
        }

        /* =======================================================
            🛠️ ส่วนจัดการกรอบรูป (Frame Selector) เป็น Responsive Grid
           ======================================================= */
        .frame-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 0 auto 20px auto;
            max-width: 100%;
            justify-items: center;
        }

        @media (min-width: 450px) {
            .frame-selector {
                grid-template-columns: repeat(3, 1fr);
                gap: 15px;
                max-width: 320px;
            }
        }

        .frame-option {
            width: 100%;
            max-width: 100px;
            aspect-ratio: 1 / 1;
            border: 3px solid #cbd5e1;
            border-radius: 10px;
            cursor: pointer;
            padding: 2px;
            transition: all 0.2s;
            background-color: #f8fafc;
            object-fit: contain;
            box-sizing: border-box;
        }

        .frame-option:hover {
            border-color: #0ea5e9;
        }

        .frame-option.active {
            border-color: #4f46e5;
            box-shadow: 0 0 10px rgba(79, 70, 229, 0.3);
        }

        .sliders-box {
            background: #bbd5ee;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: left;
        }

        .slider-control {
            display: flex;
            align-items: center;
            margin-bottom: 0;
            gap: 15px;
            padding: 5px 0;
        }

        .slider-control label {
            width: 110px;
            font-size: 14px;
            font-weight: bold;
            color: #1e05c0;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
        }

        .slider-control input[type="range"] {
            flex: 1;
            cursor: pointer;
            min-width: 5px;
        }

        .btn {
            background-color: #4f46e5;
            color: white;
            padding: 14px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:hover {
            background-color: #4338ca;
        }

        .btn:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }

        input[type="file"] {
            display: none;
        }

        .upload-label {
            display: inline-block;
            background-color: #0ea5e9;
            color: white;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
            transition: background 0.2s;
            width: 80%;
            box-sizing: border-box;
        }

        .canvas-container {
            margin: 20px auto;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            overflow: hidden;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 100%;
            aspect-ratio: 1 / 1;
            cursor: move;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        /* 📱 ปรับแต่งหน้าต่าง Popup ป้องกันปัญหา Line */
        .mobile-preview-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .mobile-preview-box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 5px 25px rgba(0,0,0,0.3);
        }

        .mobile-preview-box img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            border: 1px solid #ddd;
            display: none; /* ซ่อนไว้ก่อนจนกว่าจะโหลดภาพสำเร็จ */
        }

        .mobile-preview-box p {
            margin: 10px 0;
            font-weight: bold;
            color: #e11d48;
            font-size: 15px;
        }
        
        .line-warning-box {
            display: none;
            padding: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-header-container">
            <img src="img/Star.png" alt="ACSC Logo" class="header-logo"> 
            <h1>ACSC Picture Frame Styles</h1>                                    
        </div>
        
        <p class="subtitle">เลือกกรอบ อัพโหลดรูป และปรับขนาดได้ตามใจชอบ</p>
        <label for="imageLoader" class="upload-label">1. เลือกสไตล์กรอบรูป</label>
        <div class="frame-selector">
            <img src="img/frame1.png" class="frame-option active" onclick="changeFrame('img/frame1.png', this)" alt="กรอบที่ 1">
            <img src="img/frame2.png" class="frame-option" onclick="changeFrame('img/frame2.png', this)" alt="กรอบที่ 2">
            <img src="img/frame3.png" class="frame-option" onclick="changeFrame('img/frame3.png', this)" alt="กรอบที่ 3">
            <img src="img/frame4.png" class="frame-option" onclick="changeFrame('img/frame4.png', this)" alt="กรอบที่ 4">
            <img src="img/frame5.png" class="frame-option" onclick="changeFrame('img/frame5.png', this)" alt="กรอบที่ 5">
            <img src="img/frame6.png" class="frame-option" onclick="changeFrame('img/frame6.png', this)" alt="กรอบที่ 6">
        </div>

        <div class="control-group">
            <label for="imageLoader" class="upload-label">2. เลือกรูปภาพของคุณ</label>
            <input type="file" id="imageLoader" accept="image/*">
        </div>

        <div class="canvas-container" id="canvasContainer">
            <canvas id="imageCanvas" width="800" height="800"></canvas>
        </div>

        <div class="sliders-box">
            <div class="slider-control">
                <label>🔍 ซูมรูปภาพ:</label>
                <input type="range" id="zoomSlider" value="1" disabled>
            </div>
        </div>

        <div class="control-group">
            <button id="downloadBtn" class="btn" disabled>บันทึกรูปภาพที่แต่งเสร็จแล้ว</button>
        </div>
    </div>

    <div id="previewOverlay" class="mobile-preview-overlay">
        <div class="mobile-preview-box">
            <div id="normalMobileView">
                <p>👇 กดค้างที่รูปภาพ เพื่อบันทึก 👇</p>
                <img id="mobilePreviewImg" src="" alt="Framed Preview">
            </div>
            
            <div id="lineWarningView" class="line-warning-box">
                <h3 style="color:#e11d48; margin-top:0;">⚠️ แอป Line บล็อกการดาวน์โหลด</h3>
                <p style="color:#334155; font-weight:normal; font-size:14px; margin-bottom:20px;">
                    เนื่องจากระบบความปลอดภัยของ Line บน Android ไม่ยอมให้บันทึกรูปภาพโดยตรง <br><strong>กรุณากดปุ่มด้านล่างเพื่อเปิดใช้งานบน Google Chrome</strong> จะสามารถดาวน์โหลดได้ทันทีครับ
                </p>
                <button class="btn" style="background-color: #0ea5e9; margin-bottom:10px;" onclick="openInExternalBrowser()">🌐 เปิดหน้าเว็บนี้ใน Chrome</button>
            </div>
            
            <button class="btn" style="background-color: #64748b; margin-top: 15px;" onclick="closePreview()">กลับไปแก้ไข</button>
        </div>
    </div>

    <script>
        const imageLoader = document.getElementById('imageLoader');
        const canvas = document.getElementById('imageCanvas');
        const canvasContainer = document.getElementById('canvasContainer');
        const ctx = canvas.getContext('2d');
        const downloadBtn = document.getElementById('downloadBtn');
        const zoomSlider = document.getElementById('zoomSlider');
        const previewOverlay = document.getElementById('previewOverlay');
        const mobilePreviewImg = document.getElementById('mobilePreviewImg');
        const normalMobileView = document.getElementById('normalMobileView');
        const lineWarningView = document.getElementById('lineWarningView');

        let userImage = new Image();
        let frameImage = new Image();
        let hasUserImage = false;

        let imgScale = 1;
        let imgOffsetX = 0;
        let imgOffsetY = 0;
        let currentBlobUrl = null;

        let isDragging = false;
        let startX = 0;
        let startY = 0;

        frameImage.crossOrigin = "anonymous";
        frameImage.src = 'img/frame1.png'; 
        frameImage.onload = function() {
            drawCanvasPlaceholder();
        };

        function drawCanvasPlaceholder() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#e2e8f0";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (hasUserImage) {
                renderCombinedImage();
            } else {
                ctx.drawImage(frameImage, 0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#64748b";
                ctx.font = "30px Arial";
                ctx.textAlign = "center";
                ctx.fillText("กรุณาเลือกรูปภาพของคุณในขั้นตอนที่ 2", canvas.width / 2, canvas.height / 2 + 10);
            }
        }

        function changeFrame(frameSrc, element) {
            frameImage.crossOrigin = "anonymous";
            frameImage.src = frameSrc;
            
            document.querySelectorAll('.frame-option').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            frameImage.onload = function() {
                if(hasUserImage) {
                    renderCombinedImage();
                } else {
                    drawCanvasPlaceholder();
                }
            };
        }

        imageLoader.addEventListener('change', handleImage, false);

        function handleImage(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                userImage.crossOrigin = "anonymous";
                userImage.onload = function() {
                    hasUserImage = true;
                    
                    let baseScale = Math.max(canvas.width / userImage.width, canvas.height / userImage.height);
                    
                    zoomSlider.min = (baseScale * 0.6).toFixed(2);
                    zoomSlider.max = (baseScale * 4.0).toFixed(2);
                    zoomSlider.step = "0.01";
                    zoomSlider.value = baseScale;
                    imgScale = baseScale;
                    
                    imgOffsetX = 0;
                    imgOffsetY = 0;

                    zoomSlider.disabled = false;
                    downloadBtn.disabled = false;

                    renderCombinedImage();
                }
                userImage.src = event.target.result;
            }
            if(e.target.files[0]) {
                reader.readAsDataURL(e.target.files[0]);
            }
        }

        function renderCombinedImage() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let baseWidth = userImage.width * imgScale;
            let baseHeight = userImage.height * imgScale;
            
            let x = (canvas.width / 2) - (baseWidth / 2) + imgOffsetX;
            let y = (canvas.height / 2) - (baseHeight / 2) + imgOffsetY;
            
            ctx.drawImage(userImage, x, y, baseWidth, baseHeight);
            ctx.drawImage(frameImage, 0, 0, canvas.width, canvas.height);
        }

        zoomSlider.addEventListener('input', function() {
            imgScale = parseFloat(this.value);
            renderCombinedImage();
        });

        /* Controls */
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function startDrag(e) {
            if (!hasUserImage) return;
            isDragging = true;
            const pos = getMousePos(e);
            startX = pos.x - imgOffsetX;
            startY = pos.y - imgOffsetY;
            if(e.cancelable) e.preventDefault();
        }

        function dragMove(e) {
            if (!isDragging || !hasUserImage) return;
            const pos = getMousePos(e);
            imgOffsetX = pos.x - startX;
            imgOffsetY = pos.y - startY;
            renderCombinedImage();
            if(e.cancelable) e.preventDefault();
        }

        function stopDrag() { isDragging = false; }

        canvas.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', dragMove);
        window.addEventListener('mouseup', stopDrag);
        canvas.addEventListener('touchstart', startDrag, { passive: false });
        canvas.addEventListener('touchmove', dragMove, { passive: false });
        canvas.addEventListener('touchend', stopDrag);


        /* =======================================================
            💾 ระบบดาวน์โหลดและตรวจจับแอป Line (ไม้ตายสุดท้าย)
           ======================================================= */
        downloadBtn.addEventListener('click', function() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const isLine = (ua.indexOf("Line") > -1);
            const isAndroid = (/Android/i.test(ua));
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
            
            // 🚨 ตรวจจับเลยว่าเปิดใน Line บน Android ใช่ไหม
            if (isAndroid && isLine) {
                // แสดงผลบล็อกแจ้งเตือนย้ายไปเปิดบน Chrome
                normalMobileView.style.display = 'none';
                lineWarningView.style.display = 'block';
                previewOverlay.style.display = 'flex';
                return;
            }

            // ถ้าไม่ได้เปิดใน Line Android ให้ทำงานดาวน์โหลดตามปกติ
            try {
                if (isMobile) {
                    const base64Image = canvas.toDataURL('image/png');
                    mobilePreviewImg.src = base64Image;
                    mobilePreviewImg.style.display = 'inline-block';
                    normalMobileView.style.display = 'block';
                    lineWarningView.style.display = 'none';
                    previewOverlay.style.display = 'flex';
                } else {
                    canvas.toBlob(function(blob) {
                        if (!blob) return;
                        if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
                        currentBlobUrl = URL.createObjectURL(blob);
                        
                        const link = document.createElement('a');
                        link.download = 'custom-framed-image.png';
                        link.href = currentBlobUrl;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                    }, 'image/png');
                }
            } catch (error) {
                console.error(error);
                alert("เกิดข้อผิดพลาด กรุณาลองแคปหน้าจอแทนนะครับ");
            }
        });

        // ฟังก์ชันสั่งสลัดตัวออกจาก Line ไปเข้า Google Chrome
        function openInExternalBrowser() {
            // ใช้ความสามารถของ Line Intent สำหรับ Android ในการสั่งเปิดแอปภายนอกเดี่ยว ๆ
            const currentUrl = window.location.href.replace(/http(s)?:\/\//, "");
            window.location.href = "intent://" + currentUrl + "#Intent;scheme=https;package=com.android.chrome;end";
        }

        function closePreview() {
            previewOverlay.style.display = 'none';
        }
    </script>
</body>
</html>
